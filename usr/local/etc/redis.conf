# ==============================================================================
# Redis - Konfigurasi Best Performance
# Target: FreeBSD Jail | Host: 8 Core CPU, RAM 16 GB
# Alokasi Redis: ~10 GB RAM (sisanya untuk OS + aplikasi lain)
# ==============================================================================

################################## NETWORK #####################################

# Bind ke loopback atau IP jail — sesuaikan dengan IP jail Anda
# Ganti 10.0.0.2 dengan IP jail aktual jika akses dari luar jail diperlukan
bind 127.0.0.1

# Port default
port 6379

# Gunakan Unix socket untuk koneksi lokal (latency lebih rendah vs TCP)
unixsocket /var/run/redis/redis.sock
unixsocketperm 770

# Matikan protected-mode jika menggunakan password (requirepass)
protected-mode yes

# TCP backlog — naikkan untuk high-concurrency
# Di FreeBSD, pastikan kern.ipc.somaxconn >= nilai ini
tcp-backlog 1024

# Keepalive TCP
tcp-keepalive 300

# Timeout idle client (0 = tidak pernah timeout)
timeout 0

################################## TLS/SSL #####################################
# Aktifkan hanya jika membutuhkan enkripsi (menambah overhead CPU)
# tls-port 6380
# tls-cert-file /usr/local/etc/redis/tls/redis.crt
# tls-key-file /usr/local/etc/redis/tls/redis.key

################################# GENERAL #####################################

# Jalankan sebagai daemon
daemonize yes
pidfile /var/run/redis/redis.pid

# Level log: debug / verbose / notice / warning
loglevel notice
logfile /var/log/redis/redis.log

# Jumlah database
databases 16

# Tampilkan logo saat startup
always-show-logo no

################################ SNAPSHOTTING (RDB) ###########################

# Simpan snapshot:
# - Setiap 1 jam jika ada >= 1 perubahan
# - Setiap 5 menit jika ada >= 100 perubahan
# - Setiap 1 menit jika ada >= 10000 perubahan
save 3600 1
save 300 100
save 60 10000

# Jika RDB gagal, tolak write (agar tidak kehilangan data diam-diam)
stop-writes-on-bgsave-error yes

# Kompres RDB dengan LZF
rdbcompression yes
rdbchecksum yes

# Nama file RDB
dbfilename dump.rdb

# Direktori data Redis
dir /var/db/redis

################################# REPLICATION #################################

# Jika ini adalah replica, aktifkan:
# replicaof <masterip> <masterport>

# Replica baca-saja
replica-read-only yes

# Sinkronisasi delta (partial resync) — aktifkan untuk efisiensi
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-diskless-sync-max-replicas 0

# Backlog replication buffer (2MB)
repl-backlog-size 2mb
repl-backlog-ttl 3600

################################## SECURITY ###################################

# WAJIB: Set password kuat
# requirepass GantiDenganPasswordKuat123!

# Rename atau disable command berbahaya di production
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command DEBUG ""
# rename-command CONFIG ""
# rename-command KEYS ""

################################### CLIENTS ###################################

# Maksimum koneksi client bersamaan
# FreeBSD Jail: pastikan kern.maxfiles dan kern.maxfilesperproc cukup
maxclients 1000

################################# MEMORY #####################################

# Alokasi 10 GB untuk Redis (dari 16 GB host RAM)
# Sisakan ~6 GB untuk OS, Jail overhead, dan proses lain
maxmemory 10gb

# Policy eviction saat maxmemory tercapai:
# allkeys-lru  : hapus key yang paling jarang diakses (cache use-case)
# volatile-lru : hapus key dengan TTL yang paling jarang diakses
# noeviction   : tolak write baru (database use-case)
maxmemory-policy allkeys-lru

# Sample untuk algoritma LRU/LFU (lebih tinggi = lebih akurat, lebih lambat)
maxmemory-samples 10

# Replica boleh pakai lebih dari maxmemory (untuk repl buffer)
replica-ignore-maxmemory yes

# Aktifkan lazy freeing — hapus key besar secara async (non-blocking)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

############################ THREADED I/O #####################################

# Redis 6+ mendukung multi-threaded I/O
# Dengan 8 core, gunakan 4-6 thread I/O (main thread tetap 1)
# Jangan set melebihi jumlah core fisik yang dialokasikan ke jail
io-threads 4
io-threads-do-reads yes

############################# LAZY FREEING ####################################

# Sudah diset di atas (lazyfree-*)

############################ KERNEL OOM CONTROL ##############################

# Di FreeBSD tidak ada OOM killer seperti Linux, tapi set ini tetap aman
oom-score-adj-values 0 200 800

############################## APPEND ONLY FILE (AOF) ########################

# AOF memberikan durability lebih baik dari RDB saja
# Untuk performa tinggi, gunakan appendfsync everysec
appendonly yes
appendfilename "appendonly.aof"

# FreeBSD: everysec adalah balance terbaik antara performa dan durability
# no      = performa max, tapi data bisa hilang jika crash
# everysec = kehilangan max 1 detik data jika crash (RECOMMENDED)
# always  = durability penuh, tapi sangat lambat
appendfsync everysec

# Matikan fsync saat AOF rewrite (kurangi latency spike)
no-appendfsync-on-rewrite yes

# Auto-rewrite AOF saat ukurannya tumbuh 100% dari base size
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 128mb

# Toleransi AOF truncated saat startup
aof-load-truncated yes

# Format AOF RDB-preamble (lebih cepat load)
aof-use-rdb-preamble yes

# Fsync incremental setiap 4MB saat AOF rewrite (hindari latency spike besar)
aof-rewrite-incremental-fsync yes

# Fsync incremental saat RDB save
rdb-save-incremental-fsync yes

################################ LUA SCRIPTING ################################

# Batas waktu eksekusi Lua script (ms)
lua-time-limit 5000

################################ REDIS CLUSTER  ###############################

# Aktifkan jika menjalankan Redis Cluster
# cluster-enabled yes
# cluster-config-file nodes-6379.conf
# cluster-node-timeout 15000

################################## SLOW LOG ###################################

# Log query yang lambat (dalam microseconds)
# 10ms = 10000 microseconds
slowlog-log-slower-than 10000
slowlog-max-len 256

################################ LATENCY MONITORING ###########################

latency-monitor-threshold 100

############################# EVENT NOTIFICATION ##############################

# Nonaktifkan jika tidak dibutuhkan (hemat CPU)
notify-keyspace-events ""

############################### ADVANCED CONFIG ###############################

# Hash encoding — gunakan ziplist untuk hash kecil (hemat memory)
hash-max-listpack-entries 128
hash-max-listpack-value 64

# List encoding
list-max-listpack-size -2
list-compress-depth 1

# Set encoding
set-max-intset-entries 512
set-max-listpack-entries 128
set-max-listpack-value 64

# Sorted set encoding
zset-max-listpack-entries 128
zset-max-listpack-value 64

# HyperLogLog
hll-sparse-max-bytes 3000

# Stream
stream-node-max-bytes 4096
stream-node-max-entries 100

# Aktifkan rehashing aktif
activerehashing yes

# Penanganan buffer client
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Frekuensi tugas background (Hz) — 100 Hz untuk latensi rendah
hz 100
dynamic-hz yes

# Jemalloc background thread untuk purging memory (sangat berguna di FreeBSD)
jemalloc-bg-thread yes

# CPU affinity — pin Redis ke core 0-3, biarkan core 4-7 untuk proses lain
# Sesuaikan dengan topologi CPU jail Anda
server-cpulist 0-3
bio-cpulist 4,5
aof-rewrite-cpulist 6
bgsave-cpulist 7

########################### ACTIVE DEFRAGMENTATION ############################

# Aktifkan jika fragmentation ratio > 1.5 (cek via INFO memory)
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25
active-defrag-max-scan-fields 1000

# ==============================================================================
# CATATAN TUNING FreeBSD JAIL (tambahkan di /etc/sysctl.conf host atau jail)
# ==============================================================================
#
# kern.ipc.somaxconn=4096
# kern.ipc.maxsockbuf=16777216
# net.inet.tcp.recvspace=65536
# net.inet.tcp.sendspace=65536
# kern.maxfiles=200000
# kern.maxfilesperproc=100000
#
# Untuk Jail: pastikan allow.sysvipc=1 jika dibutuhkan
#
# Mount /var/run/redis dan /var/db/redis dengan tmpfs atau SSD cepat
# ==============================================================================