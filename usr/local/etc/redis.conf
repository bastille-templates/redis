# Redis Konfigurasi - Odoo Session Store
# ========================================
# Variabel ${...} akan di-render oleh Bastille RENDER hook

# Bind hanya ke IP jail (isolasi microservice)
bind ${JAIL_IP} 127.0.0.1
port ${REDIS_PORT}

# Proteksi
protected-mode yes
# Uncomment untuk mengaktifkan password:
# requirepass ${REDIS_REQUIREPASS}

# Manajemen Memori
maxmemory ${REDIS_MAXMEM}
maxmemory-policy ${REDIS_MAXPOL}

# Persistensi (RDB snapshot)
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /var/db/redis/

# Log
loglevel notice
logfile /var/log/redis/redis.log

# Koneksi
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Optimasi untuk session store Odoo
hz 10
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Database: 0=cache, 1=session
databases 16
